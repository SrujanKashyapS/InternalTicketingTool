services:
  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: copilot_postgres
    restart: always
    environment:
      POSTGRES_DB: copilot_db
      POSTGRES_USER: copilot_user
      POSTGRES_PASSWORD: copilot_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U copilot_user -d copilot_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: copilot_server
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    env_file:
      - .env
    command: >
      sh -c "npx prisma db push --skip-generate && npx prisma db seed || true && node dist/index.js"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: copilot_client
    restart: always
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  pgdata:
