name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-size: 20
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'

      - name: Install Dependencies
        run: |
          cd server
          npm ci

      - name: Generate Prisma Schema
        run: |
          cd server
          npx prisma generate

      - name: Run Tests
        run: |
          cd server
          npm run test

  deploy:
    name: Build & Push Images
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Server Image
        run: |
          docker build -t ticket-copilot-server ./server

      - name: Build Client Image
        run: |
          docker build -t ticket-copilot-client ./client
